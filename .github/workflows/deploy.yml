name: CI/CD Pipeline - Deploy a EC2

# Trigger: solo en push a la rama deploy
on:
  push:
    branches:
      - deploy

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1: BUILD y PUSH de las 3 imágenes a Docker Hub
  # ──────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push imágenes Docker
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: 🐳 Configurar Docker Buildx (para multi-stage eficiente)
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Frontend ──────────────────────────────────────────
      - name: 🔨 Build y Push → Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front_despacho
          dockerfile: ./front_despacho/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/frontend-despacho:latest
            ${{ secrets.DOCKER_USERNAME }}/frontend-despacho:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Backend Ventas ────────────────────────────────────
      - name: ☕ Build y Push → Backend Ventas
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST-VENTA
          dockerfile: ./back-Ventas_SpringBoot/Springboot-API-REST-VENTA/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ventas-api:latest
            ${{ secrets.DOCKER_USERNAME }}/ventas-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Backend Despachos ─────────────────────────────────
      - name: ☕ Build y Push → Backend Despachos
        uses: docker/build-push-action@v5
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          dockerfile: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/despachos-api:latest
            ${{ secrets.DOCKER_USERNAME }}/despachos-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────
  # JOB 2: DEPLOY en instancias EC2
  # Requiere que el Job 1 haya terminado exitosamente
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy en AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: 📥 Checkout (para copiar docker-compose.yml)
        uses: actions/checkout@v4

      - name: 📤 Copiar docker-compose.yml al servidor EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/proyecto-semestral/"

      - name: 🚀 Deploy vía SSH en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "=== Iniciando deploy en EC2 ==="
            cd /home/ubuntu/proyecto-semestral

            # Login a Docker Hub para descargar imágenes privadas
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Exportar variables de entorno necesarias para docker-compose
            export DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            export MYSQL_ROOT_PASSWORD="${{ secrets.MYSQL_ROOT_PASSWORD }}"
            export MYSQL_DB_VENTAS="${{ secrets.MYSQL_DB_VENTAS }}"
            export MYSQL_USER_VENTAS="${{ secrets.MYSQL_USER_VENTAS }}"
            export MYSQL_PASS_VENTAS="${{ secrets.MYSQL_PASS_VENTAS }}"
            export MYSQL_DB_DESPACHOS="${{ secrets.MYSQL_DB_DESPACHOS }}"
            export MYSQL_USER_DESPACHOS="${{ secrets.MYSQL_USER_DESPACHOS }}"
            export MYSQL_PASS_DESPACHOS="${{ secrets.MYSQL_PASS_DESPACHOS }}"
            export EC2_BACKEND_IP="${{ secrets.EC2_HOST }}"

            # Descargar imágenes nuevas desde Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/frontend-despacho:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/ventas-api:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/despachos-api:latest

            # Reiniciar solo los contenedores de aplicación (preserva volúmenes de BD)
            docker compose stop frontend ventas despachos
            docker compose rm -f frontend ventas despachos
            docker compose up -d

            # Verificar que todos los servicios están corriendo
            echo "=== Estado de los contenedores ==="
            docker compose ps

            # Limpiar imágenes antiguas para liberar espacio en disco
            docker image prune -f

            echo "=== Deploy completado exitosamente ==="
