version: '3.9'

# ================================================================
# Stack completo: Frontend + Backend Ventas + Backend Despachos
# + Bases de datos MySQL con persistencia mediante named volumes
# ================================================================

services:

  # ──────────────────────────────────────────
  # BASE DE DATOS: Ventas
  # ──────────────────────────────────────────
  db-ventas:
    image: mysql:8.0
    container_name: db_ventas
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DB_VENTAS:-ventas_db}
      MYSQL_USER: ${MYSQL_USER_VENTAS:-ventas_user}
      MYSQL_PASSWORD: ${MYSQL_PASS_VENTAS:-ventas_pass}
    # Puerto NO expuesto al host: solo accesible dentro de backend_net (seguridad)
    expose:
      - "3306"
    volumes:
      # Named volume: Docker gestiona la ubicación física.
      # Se eligió named volume (vs bind mount) porque:
      #   - Es portable entre sistemas operativos
      #   - Mayor rendimiento en Linux
      #   - No depende de rutas absolutas del host
      #   - Recomendado por Docker para datos de producción
      - ventas_db_data:/var/lib/mysql
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────
  # BASE DE DATOS: Despachos
  # ──────────────────────────────────────────
  db-despachos:
    image: mysql:8.0
    container_name: db_despachos
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DB_DESPACHOS:-despachos_db}
      MYSQL_USER: ${MYSQL_USER_DESPACHOS:-despachos_user}
      MYSQL_PASSWORD: ${MYSQL_PASS_DESPACHOS:-despachos_pass}
    expose:
      - "3306"
    volumes:
      - despachos_db_data:/var/lib/mysql
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────
  # API REST: Ventas (Spring Boot)
  # ──────────────────────────────────────────
  ventas:
    build:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST-VENTA
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME:-local}/ventas-api:latest
    container_name: ventas_api
    restart: unless-stopped
    depends_on:
      db-ventas:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-ventas:3306/${MYSQL_DB_VENTAS:-ventas_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER_VENTAS:-ventas_user}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASS_VENTAS:-ventas_pass}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=false
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 3

  # ──────────────────────────────────────────
  # API REST: Despachos (Spring Boot)
  # ──────────────────────────────────────────
  despachos:
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME:-local}/despachos-api:latest
    container_name: despachos_api
    restart: unless-stopped
    depends_on:
      db-despachos:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-despachos:3306/${MYSQL_DB_DESPACHOS:-despachos_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER_DESPACHOS:-despachos_user}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASS_DESPACHOS:-despachos_pass}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=false
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 3

  # ──────────────────────────────────────────
  # FRONTEND: React + Vite servido con Nginx
  # ──────────────────────────────────────────
  frontend:
    build:
      context: ./front_despacho
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME:-local}/frontend-despacho:latest
    container_name: frontend_app
    restart: unless-stopped
    depends_on:
      ventas:
        condition: service_healthy
      despachos:
        condition: service_healthy
    ports:
      - "80:80"
    environment:
      - VITE_API_VENTAS=http://${EC2_BACKEND_IP:-localhost}:8081
      - VITE_API_DESPACHOS=http://${EC2_BACKEND_IP:-localhost}:8082
    networks:
      - frontend_net
      - backend_net

# ──────────────────────────────────────────
# VOLÚMENES: Persistencia de datos
# Named volumes gestionados por Docker
# Los datos NO se pierden al reiniciar contenedores
# Solo se eliminan con: docker volume rm <nombre>
# ──────────────────────────────────────────
volumes:
  ventas_db_data:
    driver: local
  despachos_db_data:
    driver: local

# ──────────────────────────────────────────
# REDES: Separación de responsabilidades
# frontend_net: solo el frontend (acceso público)
# backend_net:  APIs + BDs (red privada interna)
# El frontend está en AMBAS para poder comunicarse con el back
# ──────────────────────────────────────────
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
